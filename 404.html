<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Non Trouvée | kindo</title>
    <link rel="stylesheet" href="styles.css?v=6.2">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main container */
        .error-container {
            text-align: center;
            padding: 2rem;
            z-index: 10;
            position: relative;
            max-width: 800px;
        }

        /* 404 Number Animation */
        .error-number {
            font-size: 12rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            line-height: 1;
        }

        .error-number::before {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            filter: blur(2px);
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Pet illustration */
        .pet-illustration {
            font-size: 8rem;
            animation: bounce 2s ease-in-out infinite;
            margin: 2rem 0;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0) rotate(-5deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* Error message */
        .error-message {
            color: white;
            font-size: 2rem;
            margin: 2rem 0;
            font-weight: 600;
            animation: fadeInUp 1s ease-out;
        }

        .error-submessage {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            margin: 1rem 0 2rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Buttons */
        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .error-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .error-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .error-btn:hover::before {
            left: 100%;
        }

        .error-btn-primary {
            background: white;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .error-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(10px);
        }

        .error-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Floating elements */
        .floating-element {
            position: absolute;
            font-size: 3rem;
            animation: floatElement 8s ease-in-out infinite;
            opacity: 0.6;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            bottom: 20%;
            left: 15%;
            animation-delay: 4s;
        }

        .floating-element:nth-child(4) {
            bottom: 10%;
            right: 10%;
            animation-delay: 6s;
        }

        @keyframes floatElement {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-30px) rotate(10deg);
            }
            50% {
                transform: translateY(0) rotate(0deg);
            }
            75% {
                transform: translateY(30px) rotate(-10deg);
            }
        }

        /* Search box */
        .search-container {
            margin: 2rem 0;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .search-box {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box button {
            background: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
            font-weight: 600;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .error-number {
                font-size: 6rem;
            }

            .pet-illustration {
                font-size: 5rem;
            }

            .error-message {
                font-size: 1.5rem;
            }

            .error-submessage {
                font-size: 1rem;
            }

            .error-buttons {
                flex-direction: column;
                align-items: center;
            }

            .error-btn {
                width: 100%;
                max-width: 300px;
            }

            .floating-element {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .error-number {
                font-size: 4rem;
            }

            .pet-illustration {
                font-size: 3rem;
            }

            .error-message {
                font-size: 1.2rem;
            }

            .search-box {
                flex-direction: column;
                border-radius: 20px;
            }

            .search-box input,
            .search-box button {
                width: 100%;
                border-radius: 15px;
            }

            .search-box button {
                margin-top: 0.5rem;
            }
        }

        /* Loading animation for page */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 0.5s ease-out 1s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        .loader-paw {
            font-size: 4rem;
            animation: pawPrint 1s ease-in-out infinite;
        }

        @keyframes pawPrint {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(10deg);
            }
        }
    </style>
</head>
<body>
    <!-- Page loader -->
    <div class="page-loader">
        <div class="loader-paw">🐾</div>
    </div>

    <!-- Animated particles -->
    <div class="particles" id="particles"></div>

    <!-- Floating elements -->
    <div class="floating-element">🐕</div>
    <div class="floating-element">🐈</div>
    <div class="floating-element">🦜</div>
    <div class="floating-element">🐠</div>

    <!-- Main error container -->
    <div class="error-container">
        <div class="error-number">404</div>
        <div class="pet-illustration">🐾</div>
        <h1 class="error-message">Oups ! Page Non Trouvée</h1>
        <p class="error-submessage">
            Nos amis à quatre pattes ont cherché partout,<br>
            mais cette page semble s'être échappée !
        </p>

        <!-- Search box -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" placeholder="Rechercher un produit..." id="searchInput">
                <button onclick="searchProduct()">🔍</button>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="error-buttons">
            <a href="index.html" class="error-btn error-btn-primary">
                🏠 Retour à l'Accueil
            </a>
            <a href="#products" class="error-btn error-btn-secondary">
                🛒 Voir Nos Produits
            </a>
        </div>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.width = (Math.random() * 10 + 5) + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Search functionality
        function searchProduct() {
            const searchTerm = document.getElementById('searchInput').value;
            if (searchTerm) {
                window.location.href = `index.html?search=${encodeURIComponent(searchTerm)}`;
            }
        }

        // Handle enter key in search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchProduct();
            }
        });

        // Initialize particles on load
        window.addEventListener('load', createParticles);

        // Add mouse interaction for floating elements
        document.addEventListener('mousemove', (e) => {
            const floatingElements = document.querySelectorAll('.floating-element');
            floatingElements.forEach((el, index) => {
                const speed = (index + 1) * 0.02;
                const x = (window.innerWidth / 2 - e.clientX) * speed;
                const y = (window.innerHeight / 2 - e.clientY) * speed;
                el.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
