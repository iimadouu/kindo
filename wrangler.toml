name = "kindom-upload-worker"
main = "worker/upload-worker.js"
compatibility_date = "2024-01-01"

# R2 Bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "kindo-images"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "kindom-db"

# Routes (will be configured after deployment)
# routes = [
#   { pattern = "kindom.pages.dev/api/upload/*", zone_name = "pages.dev" }
# ]

[vars]
ENVIRONMENT = "production"
